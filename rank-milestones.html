<script>
/* ============================================================================
 * apex_mobile.js -- runtime mobile fixes for apexfootydata.com
 *
 * Wraps any <table> wider than its parent in a .apex-table-scroll div so it
 * scrolls horizontally inside the page rather than pushing the body wider
 * (which would force mobile browsers to zoom out).
 *
 * Idempotent. Re-runs on tab/data renders via MutationObserver.
 * ========================================================================== */
(function () {
    'use strict';
    var WRAP_CLASS = 'apex-table-scroll';
    var WRAPPED_ATTR = 'data-apex-wrapped';

    function wrapOne(table) {
        if (!table || table.getAttribute(WRAPPED_ATTR) === '1') return false;
        var parent = table.parentElement;
        if (!parent) return false;
        if (parent.classList && parent.classList.contains(WRAP_CLASS)) return false;
        if (table.hasAttribute('data-no-scroll')) return false;

        var tableW = table.scrollWidth || table.offsetWidth || 0;
        var availW = parent.clientWidth || window.innerWidth || 0;
        if (tableW <= availW + 1) return false;

        var wrap = document.createElement('div');
        wrap.className = WRAP_CLASS;
        parent.insertBefore(wrap, table);
        wrap.appendChild(table);
        table.setAttribute(WRAPPED_ATTR, '1');
        attachScrollState(wrap);
        return true;
    }

    function attachScrollState(wrap) {
        function update() {
            var fits = wrap.scrollWidth <= wrap.clientWidth + 2;
            var atEnd = wrap.scrollLeft + wrap.clientWidth >= wrap.scrollWidth - 2;
            wrap.classList.toggle('is-fits', fits);
            wrap.classList.toggle('is-scrolled-end', !fits && atEnd);
        }
        update();
        wrap.addEventListener('scroll', update, { passive: true });
        setTimeout(update, 600);
        setTimeout(update, 2000);
        if (window.ResizeObserver) {
            try { new ResizeObserver(update).observe(wrap); } catch (e) {}
        } else {
            window.addEventListener('resize', update);
        }
    }

    function wrapAll() {
        var tables = document.querySelectorAll('table');
        for (var i = 0; i < tables.length; i++) wrapOne(tables[i]);
    }

    function boot() {
        wrapAll();
        setTimeout(wrapAll, 500);
        setTimeout(wrapAll, 1500);
        setTimeout(wrapAll, 4000);

        if (window.MutationObserver) {
            var pending = false;
            var mo = new MutationObserver(function () {
                if (pending) return;
                pending = true;
                requestAnimationFrame(function () {
                    pending = false;
                    wrapAll();
                });
            });
            mo.observe(document.body, { childList: true, subtree: true });
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot);
    } else {
        boot();
    }

    window.__apexMobileRewrap = wrapAll;
})();
