<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexFootyData · Premier League Football Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0c0c0f;
            color: #c8c8d0;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: #131318;
            border-bottom: 1px solid #2a2a35;
            padding: 24px 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .logo-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #e8e8f0;
            line-height: 1;
        }

        .logo-subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            font-weight: 600;
            color: #F97316;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Tabs */
        .tab-nav {
            display: flex;
            border-bottom: 1px solid #2a2a35;
            background: #131318;
            overflow-x: auto;
        }

        .tab-button {
            padding: 16px 24px;
            background: none;
            border: none;
            color: #6b6b7b;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab-button:hover {
            color: #c8c8d0;
        }

        .tab-button.active {
            color: #F97316;
            border-bottom-color: #F97316;
        }

        .tab-content {
            display: none;
            padding: 40px;
        }

        .tab-content.active {
            display: block;
        }

        /* Sub-tabs */
        .subtab-nav {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            border-bottom: 1px solid #2a2a35;
            padding-bottom: 16px;
        }

        .subtab-button {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid #2a2a35;
            color: #6b6b7b;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .subtab-button:hover {
            border-color: #F97316;
            color: #F97316;
        }

        .subtab-button.active {
            background: #F97316;
            color: #0c0c0f;
            border-color: #F97316;
        }

        .subtab-content {
            display: none;
        }

        .subtab-content.active {
            display: block;
        }

        /* Tables */
        .data-table {
            width: 100%;
            min-width: 700px;
            border-collapse: collapse;
            margin-bottom: 20px;
            table-layout: fixed;
        }

        .data-table thead {
            background: #18181f;
            border-bottom: 1px solid #2a2a35;
        }

        .data-table th {
            padding: 18px 20px;
            text-align: left;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b8b99;
        }

        .data-table td {
            padding: 18px 20px;
            border-top: 1px solid #2a2a35;
            font-size: 18px;
        }

        .data-table tbody tr:hover {
            background: #1e1e28;
        }

        .rank {
            width: 40px;
            text-align: center;
            color: #8b8b99;
            font-weight: 600;
        }

        .team-name {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            color: #e8e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 220px;
            white-space: nowrap;
        }

        /* Fixed widths for data-table columns (rank + team fixed, bar cols fill rest) */
        .data-table .rank { width: 52px; }
        .data-table th:nth-child(2),
        .data-table td:nth-child(2) { width: 240px; }

        .team-badge {
            width: 20px;
            height: 20px;
            object-fit: contain;
            vertical-align: middle;
            flex-shrink: 0;
        }

        /* Bar charts */
        .bar-container {
            display: flex;
            align-items: center;
            gap: 8px;
            height: 20px;
        }

        .bar-label {
            width: 64px;
            font-size: 16px;
            color: #6b6b7b;
            text-align: right;
        }

        .bar {
            height: 10px;
            background: #F97316;
            border-radius: 1px;
            min-width: 2px;
        }

        .bar.green {
            background: #34d399;
        }

        .bar.red {
            background: #f87171;
        }

        /* Win pill */
        .win-pill {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .win-pill.high {
            background: #F97316;
            color: #0c0c0f;
        }

        .win-pill.medium {
            background: transparent;
            border: 1px solid #F97316;
            color: #F97316;
        }

        .win-pill.low {
            background: transparent;
            color: #6b6b7b;
        }

        .win-pill.draw {
            background: #18181f;
            color: #c8c8d0;
            border: 1px solid #2a2a35;
        }

        /* Sparkline grid */
        .sparkline-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .sparkline-card {
            background: #131318;
            border: 1px solid #2a2a35;
            padding: 16px;
        }

        .sparkline-card:hover {
            background: #1e1e28;
            border-color: #F97316;
        }

        .sparkline-team {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 17px;
            font-weight: 600;
            color: #e8e8f0;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sparkline-svg {
            width: 100%;
            height: 40px;
        }

        .sparkline-change {
            font-size: 14px;
            margin-top: 8px;
            font-weight: 600;
        }

        .change-positive {
            color: #34d399;
        }

        .change-negative {
            color: #f87171;
        }

        /* Matchweek compact table — auto width so columns fit content tightly */
        .matchweek-table {
            width: auto;
            min-width: 600px;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .matchweek-table th {
            padding: 18px 20px;
            text-align: left;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b8b99;
            background: #18181f;
            border-bottom: 1px solid #2a2a35;
        }

        .matchweek-table td {
            padding: 18px 20px;
            font-size: 17px;
            border-top: 1px solid #2a2a35;
        }

        .matchweek-home-row {
            background: #18181f;
        }

        .matchweek-away-row {
            background: #131318;
            border-bottom: 2px solid rgba(249, 115, 22, 0.35);
        }

        .matchweek-vs-cell {
            text-align: center;
            color: #6b6b7b;
            font-size: 13px;
            font-weight: 600;
        }

        .fixture-team-cell {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            color: #e8e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 240px;
        }

        /* Matchweek: fixture col fixed, stat cols fill remaining space */
        .matchweek-table th:nth-child(1),
        .matchweek-table td:nth-child(1) { width: 240px; }

        .fixture-stat {
            text-align: center;
            color: #8b8b99;
            font-size: 17px;
        }

        .fixture-draw {
            color: #F97316;
            font-weight: 600;
        }

        .fixture-win-pill {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
            text-align: center;
        }

        .fixture-win-pill.high {
            background: #F97316;
            color: #0c0c0f;
        }

        .fixture-win-pill.medium {
            background: transparent;
            border: 1px solid #F97316;
            color: #F97316;
        }

        .fixture-win-pill.low {
            background: transparent;
            color: #6b6b7b;
        }

        /* Heatmap */
        .heatmap-table {
            width: 100%;
            min-width: 1300px;
            border-collapse: collapse;
            margin-bottom: 20px;
            table-layout: fixed;
        }

        .heatmap-table thead {
            background: #18181f;
            border-bottom: 1px solid #2a2a35;
        }

        .heatmap-table th {
            padding: 18px 12px;
            text-align: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            color: #8b8b99;
        }

        .heatmap-table td {
            padding: 14px 12px;
            text-align: center;
            border: 1px solid #2a2a35;
            font-size: 17px;
            font-weight: 600;
        }

        .heatmap-cell {
            background: #131318;
            color: #c8c8d0;
            border-radius: 2px;
        }

        .heatmap-cell.level0 { background: rgba(249, 115, 22, 0.08); }
        .heatmap-cell.level1 { background: rgba(249, 115, 22, 0.18); }
        .heatmap-cell.level2 { background: rgba(249, 115, 22, 0.32); }
        .heatmap-cell.level3 { background: rgba(249, 115, 22, 0.50); }
        .heatmap-cell.level4 { background: rgba(249, 115, 22, 0.72); color: #0c0c0f; }

        .heatmap-team {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            color: #e8e8f0;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 240px;
        }

        /* Heatmap: team col fixed, GW cols fill remaining space equally */
        .heatmap-table th:first-child,
        .heatmap-table td:first-child { width: 240px; }

        /* Player heatmap cells */
        .hm-1 { background: rgba(249,115,22,0.08); color: #c8c8d0; text-align: right; }
        .hm-2 { background: rgba(249,115,22,0.18); color: #e8e8f0; text-align: right; }
        .hm-3 { background: rgba(249,115,22,0.32); color: #f0f0f5; text-align: right; }
        .hm-4 { background: rgba(249,115,22,0.50); color: #f0f0f5; text-align: right; }
        .hm-5 { background: rgba(249,115,22,0.72); color: #f0f0f5; font-weight: 600; text-align: right; }
        .hm-blank { background: #131318; color: #2a2a35; text-align: right; }
        .hm-total { font-weight: 700; color: #F97316; text-align: right; }

        /* Final table */
        /* Final Table - Projected Points Bar Design */
        .final-panel {
            background: #131318;
            border: 1px solid #2a2a35;
            border-radius: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 20px;
        }

        .final-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a35;
            background: #18181f;
        }

        .final-panel-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #e8e8f0;
        }

        .final-panel-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 500;
            color: #4a4a5a;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .final-table {
            width: 100%;
            min-width: 560px;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .final-table thead {
            background: #18181f;
            border-bottom: 1px solid #2a2a35;
        }

        .final-table th {
            padding: 16px 16px;
            text-align: left;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6b6b7b;
        }

        /* Final table column widths set directly on th elements in HTML */

        .final-table td {
            padding: 16px 16px;
            border-top: 1px solid #1e1e28;
            font-size: 17px;
            vertical-align: middle;
        }

        .final-table tbody tr {
            background: transparent;
            position: relative;
        }

        .final-table tbody tr:hover {
            background: #1a1a22;
        }

        /* Position color accent — left border stripe */
        .final-table tbody tr td:first-child {
            position: relative;
            padding-left: 18px;
        }

        .final-table tbody tr.cl-zone td:first-child::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #34d399;
        }

        .final-table tbody tr.europa-zone td:first-child::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #F97316;
            opacity: 0.7;
        }

        .final-table tbody tr.relegation-zone td:first-child::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #f87171;
        }

        .final-rank {
            width: 52px;
            text-align: center;
            color: #6b6b7b;
            font-size: 17px;
            font-weight: 600;
        }

        .final-rank-cl { color: #34d399; }
        .final-rank-europa { color: #F97316; }
        .final-rank-rel { color: #f87171; }

        .final-team {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            color: #e8e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 240px;
        }

        .final-stat {
            text-align: right;
            color: #6b6b7b;
            width: 60px;
            font-size: 16px;
        }

        .final-points {
            text-align: right;
            font-weight: 700;
            color: #ffffff;
            width: 64px;
            font-size: 20px;
        }

        .final-left {
            text-align: right;
            color: #6b6b7b;
            width: 58px;
            font-size: 16px;
        }

        /* Projected pts bar cell */
        .final-bar-cell {
            min-width: 200px;
        }

        .proj-bar-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .proj-bar-track {
            flex: 1;
            height: 8px;
            background: #1e1e28;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            min-width: 80px;
        }

        .proj-bar-current {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            background: #2e2e3d;
            border-radius: 4px 0 0 4px;
        }

        .proj-bar-ext {
            position: absolute;
            top: 0;
            bottom: 0;
            background: #F97316;
            border-radius: 0 4px 4px 0;
        }

        .proj-bar-num {
            font-size: 17px;
            font-weight: 600;
            color: #F97316;
            white-space: nowrap;
            min-width: 42px;
            text-align: right;
        }

        .final-range {
            text-align: right;
            color: #4a4a5a;
            font-size: 15px;
            white-space: nowrap;
            width: 86px;
        }

        /* Player table */
        .player-table {
            width: 100%;
            min-width: 1200px;
            border-collapse: collapse;
            margin-bottom: 20px;
            table-layout: fixed;
        }

        .player-table thead {
            background: #18181f;
            border-bottom: 1px solid #2a2a35;
        }

        .player-table th {
            padding: 18px 16px;
            text-align: left;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b8b99;
        }

        .player-table td {
            padding: 16px 16px;
            border-top: 1px solid #2a2a35;
            font-size: 17px;
        }

        .player-table tbody tr:hover {
            background: #1e1e28;
        }

        .player-name {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            color: #e8e8f0;
            width: 190px;
        }

        .player-team {
            color: #6b6b7b;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 7px;
            width: 175px;
        }

        /* Player table: name + team fixed, GW cols fill remaining space equally */
        .player-table th:nth-child(1),
        .player-table td:nth-child(1) { width: 190px; }
        .player-table th:nth-child(2),
        .player-table td:nth-child(2) { width: 175px; }

        .player-stat {
            text-align: right;
            color: #8b8b99;
        }

        .player-total {
            text-align: right;
            font-weight: 600;
            color: #F97316;
        }

        /* Next GW table — separate class to avoid player-table column conflicts */
        .nextgw-table {
            width: 100%;
            min-width: 860px;
            border-collapse: collapse;
            margin-bottom: 20px;
            table-layout: fixed;
        }
        .nextgw-table thead { background: #18181f; border-bottom: 1px solid #2a2a35; }
        .nextgw-table th {
            padding: 18px 16px;
            text-align: left;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b8b99;
        }
        .nextgw-table td {
            padding: 16px 16px;
            border-top: 1px solid #2a2a35;
            font-size: 17px;
            vertical-align: middle;
        }
        .nextgw-table tbody tr:hover { background: #1e1e28; }
        .ngw-fixture {
            color: #8b8b99;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .ngw-blank { color: #2a2a35; font-size: 14px; font-style: italic; }

        /* Placeholder */
        .placeholder {
            background: #131318;
            border: 1px solid #2a2a35;
            padding: 40px;
            text-align: center;
            color: #6b6b7b;
            font-style: italic;
        }

        /* Footer */
        .footer {
            border-top: 1px solid #2a2a35;
            padding: 30px 40px;
            text-align: center;
            color: #6b6b7b;
            font-size: 12px;
            margin-top: 60px;
        }

        /* Responsive */
        /* ── Horizontal scroll for all table containers ─────────────── */
        .subtab-content,
        #matchweekContainer {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            max-width: 100%;
        }
        .subtab-nav {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            flex-wrap: nowrap;
        }

        @media (max-width: 1200px) {
            .sparkline-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
            }
            .logo-icon svg {
                width: 38px;
                height: 38px;
            }
            .logo-brand {
                font-size: 19px;
            }
            .logo-subtitle {
                font-size: 9px;
                letter-spacing: 2px;
            }
            .tab-content {
                padding: 12px;
            }
            .sparkline-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .bar-container {
                flex-wrap: nowrap;
            }
            .tab-nav {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .tab-button {
                padding: 10px 14px;
                font-size: 12px;
                white-space: nowrap;
            }
            .subtab-button {
                padding: 8px 12px;
                font-size: 11px;
                white-space: nowrap;
            }
            /* Matchweek */
            .matchweek-table td,
            .matchweek-table th {
                padding: 12px 10px;
                font-size: 13px;
            }
            .fixture-team-cell {
                width: 140px;
                font-size: 13px;
                gap: 6px;
            }
            .matchweek-table th:nth-child(1),
            .matchweek-table td:nth-child(1) { width: 140px; }
            .fixture-win-pill {
                padding: 4px 8px;
                font-size: 13px;
            }
            .fixture-stat { font-size: 13px; }
            /* Heatmap */
            .heatmap-table th,
            .heatmap-table td {
                padding: 10px 7px;
                font-size: 12px;
            }
            .heatmap-table th:first-child,
            .heatmap-table td:first-child { width: 160px; }
            .heatmap-team {
                width: 160px;
                min-width: 160px;
                font-size: 12px;
            }
            /* Data table team col */
            .data-table th:nth-child(2),
            .data-table td:nth-child(2) { width: 180px; }
            .team-name { width: 180px; }
            /* Player tables */
            .player-table th,
            .player-table td {
                padding: 10px 8px;
                font-size: 12px;
            }
            /* Final table */
            .final-table th,
            .final-table td {
                padding: 10px 8px;
                font-size: 12px;
            }
            /* Accuracy / data tables */
            .data-table th,
            .data-table td {
                padding: 10px 8px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {

        // Render sparklines — show last 10 GWs for recent form
        function renderSparklines() {
            const html = Object.entries(TRENDS).map(([team, data]) => {
                const recent = data.values.slice(-10);
                const recentChange = recent[recent.length - 1] - recent[0];
                const lineColor = recentChange >= 0 ? '#34d399' : '#f87171';
                const svg = createSparklineSVG(recent, lineColor);
                const changeClass = recentChange >= 0 ? 'change-positive' : 'change-negative';
                const changeSign = recentChange >= 0 ? '+' : '';
                return `
                    <div class="sparkline-card">
                        <div class="sparkline-team">${getTeamNameWithBadge(team)}</div>
                        ${svg}
                        <div class="sparkline-change ${changeClass}">${changeSign}${(recentChange * 100).toFixed(0)}%</div>
                    </div>
                `;
            }).join('');
            document.getElementById('sparklineGrid').innerHTML = html;
        }

        function createSparklineSVG(values, color) {
            color = color || '#F97316';
            const w = 240, h = 40, padding = 5;

            // Strip consecutive duplicate values (blank GW placeholders) so only real game points are plotted
            const deduped = values.filter((v, i) => i === 0 || v !== values[i - 1]);

            const minVal = Math.min(...deduped);
            const maxVal = Math.max(...deduped);
            const range = maxVal - minVal || 1;

            const pts = deduped.map((v, i) => ({
                x: padding + (i / (deduped.length - 1)) * (w - 2 * padding),
                y: h - padding - ((v - minVal) / range) * (h - 2 * padding)
            }));

            // Smooth curve: quadratic bezier through midpoints between each pair of real data points
            let pathD = `M ${pts[0].x} ${pts[0].y}`;
            for (let i = 0; i < pts.length - 1; i++) {
                const mx = (pts[i].x + pts[i + 1].x) / 2;
                const my = (pts[i].y + pts[i + 1].y) / 2;
                if (i === 0) {
                    pathD += ` Q ${pts[i].x},${pts[i].y} ${mx},${my}`;
                } else {
                    pathD += ` Q ${pts[i].x},${pts[i].y} ${mx},${my}`;
                }
            }
            pathD += ` L ${pts[pts.length - 1].x} ${pts[pts.length - 1].y}`;

            const fillPath = pathD + ` L ${pts[pts.length - 1].x} ${h} L ${pts[0].x} ${h} Z`;

            const gradId = 'grad-' + color.replace('#','');
            return `<svg class="sparkline-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
                <defs>
                    <linearGradient id="${gradId}" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:${color};stop-opacity:0.3" />
                        <stop offset="100%" style="stop-color:${color};stop-opacity:0.05" />
                    </linearGradient>
                </defs>
                <path d="${pathD}" stroke="${color}" stroke-width="1.5" fill="none"/>
                <path d="${fillPath}" fill="url(#${gradId})"/>
            </svg>`;
        }

        // Render matchweek - compact table layout
        function renderMatchweek() {
            let html = `<table class="matchweek-table"><thead><tr><th style="width:240px">FIXTURE</th><th style="width:110px;text-align:center">xG</th><th style="width:110px;text-align:center">CS%</th><th style="text-align:center">WIN</th><th style="width:110px;text-align:center"></th><th style="width:130px;text-align:center">DRAW</th></tr></thead><tbody>`;
            const gwLabel = (GW_LABELS && GW_LABELS[0]) || 'GW?';

            FIXTURES.forEach((f, idx) => {
                const homeWinClass = f.homeWinDisplay > 40 ? 'high' : f.homeWinDisplay > 30 ? 'medium' : 'low';
                const awayWinClass = f.awayWinDisplay > 40 ? 'high' : f.awayWinDisplay > 30 ? 'medium' : 'low';
                const homeCS = (f.homeCS != null) ? f.homeCS.toFixed(1) + '%' : '—';
                const awayCS = (f.awayCS != null) ? f.awayCS.toFixed(1) + '%' : '—';

                // Home team row
                html += `<tr class="matchweek-home-row">
                    <td class="fixture-team-cell">${getTeamNameWithBadge(f.home)}</td>
                    <td class="fixture-stat">${f.homeRating.toFixed(2)}</td>
                    <td class="fixture-stat">${homeCS}</td>
                    <td class="fixture-stat"><span class="fixture-win-pill ${homeWinClass}">${f.homeWinDisplay.toFixed(1)}%</span></td>
                    <td class="matchweek-vs-cell" rowspan="2">v<br/>(${gwLabel})</td>
                    <td class="fixture-stat fixture-draw" rowspan="2">${f.draw.toFixed(1)}%</td>
                </tr>`;

                // Away team row
                html += `<tr class="matchweek-away-row">
                    <td class="fixture-team-cell">${getTeamNameWithBadge(f.away)}</td>
                    <td class="fixture-stat">${f.awayRating.toFixed(2)}</td>

                    <td class="fixture-stat"><span class="fixture-win-pill ${awayWinClass}">${f.awayWinDisplay.toFixed(1)}%</span></td>

            });

            html += `</tbody></table>`;
            document.getElementById('matchweekContainer').innerHTML = html;
        }

        // Render team predictions
        function renderTeamPredictions() {
            const teams = Object.keys(TEAM_PREDICTIONS).sort((a, b) => {
                const sum = t => TEAM_PREDICTIONS[t].reduce((acc, v) => acc + (v || 0), 0);
                return sum(b) - sum(a);
            });
            const gwCols = GW_LABELS.map(l => `<th style="text-align:center">${l}</th>`).join('');
            document.getElementById('teamPredHeadline').innerHTML = `<tr><th>Team</th>${gwCols}<th style="text-align:center">TOTAL</th></tr>`;

            const bodyHtml = teams.map(team => {
                const vals = TEAM_PREDICTIONS[team];
                const total = vals.reduce((acc, v) => acc + (v || 0), 0);
                return `<tr><td class="heatmap-team">${getTeamNameWithBadge(team)}</td>` +
                    vals.map(v => {
                        if (v === null || v === undefined) return `<td class="heatmap-cell">—</td>`;
                        let level = 0;
                        if (v >= 70) level = 4;
                        else if (v >= 55) level = 3;
                        else if (v >= 40) level = 2;
                        else if (v >= 25) level = 1;
                        return `<td class="heatmap-cell level${level}">${v}%</td>`;
                    }).join('') +
                    `<td class="heatmap-cell" style="font-weight:600">${total.toFixed(0)}%</td></tr>`;
            }).join('');
            document.getElementById('teamPredBody').innerHTML = bodyHtml;
        }

                        if (v === null) return `<td class="hm-blank">—</td>`;
                        const level = v >= 0.80 ? 4 : v >= 0.60 ? 3 : v >= 0.45 ? 2 : v >= 0.30 ? 1 : 0;
                        return `<td class="heatmap-cell level${level}" style="text-align:right">${v.toFixed(2)}</td>`;
                    }).join('')}
                    <td class="hm-total" style="text-align:right">${p.total.toFixed(2)}</td>
                </tr>`;
            }).join('');
            document.getElementById('playerGITable').innerHTML = html;
        }

        // Render final table — projected points bar visualization
        function renderFinalTable() {
            const MAX_PTS = 102;
            // Sort by projected points descending — this IS the predicted final ranking
            const sorted = [...FINAL_TABLE].sort((a, b) => b.projected - a.projected);

            const html = sorted.map((t, i) => {
                const rank = i + 1;
                let zoneClass = '';
                let rankClass = 'final-rank';
                if (rank <= 4)       { zoneClass = 'cl-zone';         rankClass += ' final-rank-cl'; }
                else if (rank <= 6)  { zoneClass = 'europa-zone';     rankClass += ' final-rank-europa'; }
                else if (rank >= 18) { zoneClass = 'relegation-zone'; rankClass += ' final-rank-rel'; }

                // Bar segments as % of MAX_PTS
                const currentPct = (t.points / MAX_PTS * 100).toFixed(1);
                const extPct     = ((t.projected - t.points) / MAX_PTS * 100).toFixed(1);

                return `<tr class="${zoneClass}">
                    <td class="${rankClass}">${rank}</td>
                    <td class="final-team">${getTeamNameWithBadge(t.team)}</td>
                    <td class="final-stat" style="text-align:right">${t.played}</td>
                    <td class="final-points" style="text-align:right">${t.points}</td>
                    <td class="final-left" style="text-align:right">${t.left}</td>
                    <td class="final-bar-cell">
                        <div class="proj-bar-wrap">
                            <div class="proj-bar-track">
                                <div class="proj-bar-current" style="width:${currentPct}%"></div>
                                <div class="proj-bar-ext" style="left:${currentPct}%;width:${extPct}%"></div>
                            </div>
                            <span class="proj-bar-num">${t.projected.toFixed(1)}</span>
                        </div>
                    </td>
                </tr>`;
            }).join('');
            document.getElementById('finalTableBody').innerHTML = html;
        }

        // Initialize
        renderRatings();
        renderSparklines();
        renderMatchweek();
        renderTeamPredictions();
        renderTeamGoals();
        renderTeamCS();
        renderPlayerGoals();
        renderPlayerNextGW();
        renderPlayerAssists();
        renderPlayerGI();
        renderFinalTable();
    </script>
</body>
</html>
